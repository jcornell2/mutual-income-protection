<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./streamlit-component-lib.js"></script>
  </head>
  <body style="margin:0;padding:0;background:#F5F7FA;">
    <iframe
      id="intake"
      title="Mutual Income Protection intake form"
      src="/static/apply_form.html"
      style="width:100%;border:0;display:block;min-height:2400px;"
      scrolling="yes"
    ></iframe>
    <script>
      const iframe = document.getElementById("intake");

      function onRender(event) {
        const args = event.detail.args || {};
        const height = args.height || 2400;
        iframe.style.height = height + "px";
        iframe.style.minHeight = height + "px";
        Streamlit.setFrameHeight(height);
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(2400);

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "streamlit:setComponentValue") {
          Streamlit.setComponentValue(data.value);
        }
      });
    </script>
  </body>
</html>
